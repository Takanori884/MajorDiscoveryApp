<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>情報学部 学科発見アプリ | 広島工業大学</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#e7edf5;
  --text:#18182e;
  --muted:#667085;
  --line:#e4e8f0;
  --brand:#1a3060;
  --accent:#5B6E8C;
  --shadow:0 8px 26px rgba(16,24,40,.08);
  --deep-navy:#1F3C88;
  --dark-navy:#34495E;
  --title-blue-gray:#5B6E8C;
  --title-mint-blue:#4FB3BF;
}
html{min-height:100%;background:#e7edf5;}
body{
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Meiryo',sans-serif;
  background:linear-gradient(180deg,#e4ebf4 0%,#f1f5fa 52%,#edf2f8 100%);
  min-height:100svh;
  color:var(--text);
}
body.start-mode{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}
body.app-mode{
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:18px 14px calc(28px + env(safe-area-inset-bottom));
}
button,a{-webkit-tap-highlight-color:transparent;}
.start-screen{
  min-height:100svh;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:calc(36px + env(safe-area-inset-top)) 24px calc(36px + env(safe-area-inset-bottom));
}
.start-title{
  display:flex !important;
  flex-direction:row;
  flex-wrap:wrap;
  align-items:baseline;
  justify-content:center;
  gap:.24em;
  font-size:clamp(29px,7.2vw,42px);
  font-weight:900;
  line-height:1.16;
  letter-spacing:.035em;
  text-align:center;
  margin:0 0 12px;
  white-space:normal;
  background:linear-gradient(90deg,var(--title-blue-gray) 0%,var(--title-mint-blue) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
}
.start-title span{
  display:block;
  color:inherit;
  -webkit-text-fill-color:inherit;
}
.start-lead{
  color:var(--dark-navy);
  font-size:22px;
  font-weight:900;
  line-height:1.22;
  text-align:center;
  margin:0 0 24px;
  max-width:min(100%,520px);
  width:100%;
  letter-spacing:0;
  white-space:nowrap;
}
.start-characters{
  width:100%;
  max-width:580px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:0;
  margin:0 0 18px;
  padding:0;
}
.start-character{
  flex:1 1 0;
  max-width:182px;
  min-width:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  margin:0 -7px;
  overflow:visible;
}
.start-character img{
  display:block;
  width:120%;
  max-width:none;
  height:auto;
  max-height:min(46svh,376px);
  object-fit:contain;
  object-position:bottom center;
  filter:drop-shadow(0 10px 15px rgba(16,24,40,.18));
  margin-bottom:6px;
}
.start-character figcaption{
  text-align:center;
  line-height:1.15;
  color:var(--deep-navy);
}
.start-character .dept-label{
  display:block;
  font-size:11px;
  font-weight:800;
  letter-spacing:.01em;
  margin-bottom:4px;
}
.start-character .char-name{
  display:block;
  font-size:16px;
  font-weight:900;
  letter-spacing:.02em;
}
.start-btn{
  appearance:none;
  border:none;
  width:min(82vw,320px);
  min-height:62px;
  margin-top:24px;
  border-radius:999px;
  background:linear-gradient(135deg,#34495E,#5B6E8C);
  color:#fff;
  font-size:22px;
  font-weight:800;
  letter-spacing:.04em;
  font-family:inherit;
  box-shadow:0 12px 24px rgba(52,73,94,.24);
  cursor:pointer;
  transition:transform .12s ease,box-shadow .12s ease,filter .12s ease;
}
.start-btn:active{transform:scale(.98);box-shadow:0 8px 18px rgba(52,73,94,.20);filter:brightness(.98);}
.start-note{font-size:12px;color:#5b6577;line-height:1.65;text-align:center;margin-top:16px;font-weight:700;max-width:360px;}
.container{width:100%;max-width:430px;display:none;}
body.question-mode .container{padding-top:24px;}
.header{text-align:center;margin:4px 0 18px;}
.header h1{font-size:19px;font-weight:800;color:var(--brand);margin-bottom:6px;line-height:1.35;}
.header p{font-size:12px;color:var(--muted);line-height:1.7;}
.prog-area{margin-bottom:14px;}
.prog-bar{height:6px;background:#dde3ee;border-radius:999px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#34495E,#5B6E8C);border-radius:999px;transition:width .32s ease;}
.prog-label{font-size:12px;color:#5b6577;margin-top:7px;text-align:right;font-weight:700;}
.q-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px 18px 18px;box-shadow:var(--shadow);animation:fi .24s ease;}
@keyframes fi{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.q-num{font-size:11px;letter-spacing:.1em;color:#667085;margin-bottom:10px;font-weight:800;}
.q-guide{font-size:14px;font-weight:800;color:#5b6577;line-height:1.75;margin:0 2px 12px;padding:0 1px;}
.q-text{font-size:18px;font-weight:800;color:var(--text);line-height:1.65;margin-bottom:16px;}
.choices{display:flex;flex-direction:column;gap:11px;}
.c-btn{background:#eef3fb;border:1.5px solid #5a8fe0;border-radius:14px;padding:15px 16px;text-align:left;cursor:pointer;font-size:15px;color:#222;line-height:1.6;font-family:inherit;font-weight:700;transition:background .13s,transform .1s;}
.c-btn:active{transform:scale(.99);background:#e2ebf9;}
.c-btn.selected{background:#FFF3E3;border-color:#F08C16;box-shadow:0 0 0 2px rgba(240,140,22,.18);}
.choices.locked .c-btn{pointer-events:none;}
.choices.locked .c-btn:not(.selected){opacity:.55;}
.back-btn{margin-top:34px;background:#fff;border:1.5px solid #d0d5dd;border-radius:14px;font-size:14px;color:#667085;cursor:pointer;padding:13px 18px;font-family:inherit;font-weight:800;width:100%;min-height:48px;box-shadow:0 2px 10px rgba(16,24,40,.04);}
.result-wrap{animation:fi .26s ease;}
.result-top{background:#fff;border:1px solid var(--line);border-radius:20px;padding:24px 18px 20px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.r-hero{margin:-24px -18px 20px;padding:30px 20px 24px;text-align:center;color:#fff;position:relative;overflow:hidden;}
.r-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% -40%,rgba(255,255,255,.32),rgba(255,255,255,0) 62%);pointer-events:none;}
.r-hero-eyebrow{position:relative;font-size:13px;font-weight:800;letter-spacing:.14em;opacity:.92;margin-bottom:8px;animation:heroIn .5s ease .05s both;}
.r-hero-type{position:relative;font-size:28px;font-weight:900;line-height:1.3;letter-spacing:.02em;text-shadow:0 2px 10px rgba(0,0,0,.14);animation:heroPop .55s cubic-bezier(.2,.9,.3,1.2) .18s both;}
.r-hero-type.long{font-size:23px;letter-spacing:.01em;line-height:1.45;}.r-hero-reason{position:relative;max-width:340px;margin:13px auto 0;font-size:13px;font-weight:800;line-height:1.65;color:rgba(255,255,255,.95);text-shadow:0 1px 8px rgba(0,0,0,.12);animation:heroIn .5s ease .32s both;}
.r-hero-rule{position:relative;width:46px;height:3px;border-radius:999px;background:rgba(255,255,255,.55);margin:14px auto 0;animation:heroIn .5s ease .4s both;}
@keyframes heroIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes heroPop{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.r-body-stagger>*{animation:fi .4s ease both;}
.r-body-stagger>*:nth-child(1){animation-delay:.3s;}
.r-body-stagger>*:nth-child(2){animation-delay:.38s;}
.r-body-stagger>*:nth-child(3){animation-delay:.46s;}
.judging-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:46px 20px;box-shadow:var(--shadow);text-align:center;animation:fi .24s ease;}
.judging-dots{display:flex;justify-content:center;gap:11px;margin-bottom:20px;}
.judging-dots span{width:13px;height:13px;border-radius:50%;animation:jb 1s ease-in-out infinite;}
.judging-dots span:nth-child(1){background:#1D9E75;}
.judging-dots span:nth-child(2){background:#2F6FD6;animation-delay:.16s;}
.judging-dots span:nth-child(3){background:#BA7517;animation-delay:.32s;}
@keyframes jb{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-11px);}}
.judging-text{font-size:15px;font-weight:800;color:var(--brand);letter-spacing:.04em;}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-delay:0ms !important;transition-duration:.01ms !important;}
}
.r-announce{font-size:17px;color:var(--brand);margin-bottom:12px;font-weight:800;line-height:1.5;}
.r-rank1-name{font-size:30px;font-weight:900;margin-bottom:8px;line-height:1.28;letter-spacing:.01em;white-space:nowrap;}
.r-catch{font-size:13px;color:#344054;line-height:1.6;margin-bottom:9px;font-weight:800;white-space:normal;overflow:visible;}
.r-goal{font-size:13px;color:#475467;line-height:1.7;margin:12px 0 0;font-weight:800;background:#f4f7fb;border-radius:12px;padding:10px 12px;width:100%;}
.others-title,.tie-section-title{font-size:17px;color:#34495E;margin:10px 0 12px;font-weight:900;line-height:1.5;padding-left:10px;border-left:4px solid #5B6E8C;letter-spacing:.01em;}
.rank-others{display:flex;flex-direction:column;gap:11px;margin-bottom:14px;}
.rank-card{background:#fff;border:1px solid var(--line);border-radius:17px;padding:16px 15px;display:block;box-shadow:0 4px 16px rgba(16,24,40,.06);}
.summary-note{font-size:14px;color:#344054;line-height:1.8;margin-bottom:16px;background:#f4f7fb;border-left:4px solid #5a8fe0;border-radius:12px;padding:12px 14px;font-weight:700;}
.result-media{display:flex;align-items:flex-start;gap:14px;}
.result-text-col,.rank-body{flex:1;min-width:0;}
.dept-portrait{flex:0 0 auto;border-radius:22px;overflow:hidden;background:#fff;border:3px solid var(--portrait-border,#dbe4ee);box-shadow:0 6px 14px rgba(16,24,40,.10);}
.dept-portrait img{display:block;width:100%;height:100%;object-fit:cover;object-position:var(--portrait-pos,center center);transform:none;}
.dept-portrait.large{width:102px;height:102px;}
.dept-portrait.compact{width:74px;height:74px;}
.rank-card .result-media{gap:12px;}
.rank-body{width:100%;}
.rank-name{font-size:18px;font-weight:900;line-height:1.35;margin-bottom:5px;white-space:nowrap;}
.rank-sub{font-size:13px;color:#344054;line-height:1.6;font-weight:800;margin-bottom:8px;}
.rank-goal{font-size:12px;color:#475467;line-height:1.6;font-weight:800;background:#f4f7fb;border-radius:10px;padding:8px 10px;margin-top:9px;width:100%;}
.event-action-row{display:flex;justify-content:flex-end;margin-top:12px;}
.event-btn{appearance:none;border:none;border-radius:999px;background:linear-gradient(135deg,var(--event-accent,#5a8fe0),var(--event-main,#344054));color:#fff;font-size:12px;font-weight:900;line-height:1.3;padding:10px 14px;min-height:40px;font-family:inherit;box-shadow:0 8px 16px rgba(16,24,40,.12);cursor:pointer;}
.event-btn:active{transform:scale(.98);filter:brightness(.98);}
.feedback-area{margin:20px 0 12px;padding:16px 15px;border:1px solid #dfe6f0;border-radius:18px;background:#f4f7fb;text-align:center;box-shadow:0 4px 14px rgba(16,24,40,.05);}
.feedback-title{font-size:15px;font-weight:900;color:var(--brand);line-height:1.5;margin-bottom:5px;}
.feedback-lead{font-size:12px;font-weight:800;color:#667085;line-height:1.65;margin-bottom:12px;}
.feedback-btn{appearance:none;border:none;border-radius:999px;width:100%;min-height:46px;padding:12px 16px;background:linear-gradient(135deg,#34495E,#5B6E8C);color:#fff;font-size:14px;font-weight:900;line-height:1.35;font-family:inherit;box-shadow:0 10px 20px rgba(52,73,94,.16);cursor:pointer;}
.feedback-btn:active{transform:scale(.99);filter:brightness(.98);}
.feedback-btn.sent{background:#fff;color:#5B6E8C;border:1.5px solid #d0d5dd;box-shadow:none;cursor:default;}
.feedback-btn:disabled{opacity:1;}
.feedback-modal-lead{font-size:13px;font-weight:800;color:#475467;line-height:1.7;margin-bottom:13px;}
.feedback-options{display:flex;flex-direction:column;gap:10px;}
.feedback-option{appearance:none;width:100%;border:1.5px solid #5a8fe0;border-radius:14px;background:#eef3fb;color:#222;text-align:left;padding:14px 15px;font-size:14px;font-weight:800;line-height:1.55;font-family:inherit;cursor:pointer;transition:background .13s,transform .1s;}
.feedback-option:active{transform:scale(.99);background:#e2ebf9;}
.feedback-option.selected{background:#FFF3E3;border-color:#F08C16;box-shadow:0 0 0 2px rgba(240,140,22,.18);}
.feedback-options.locked .feedback-option{pointer-events:none;}
.feedback-options.locked .feedback-option:not(.selected){opacity:.55;}
.feedback-thanks{font-size:18px;font-weight:900;color:var(--brand);line-height:1.6;text-align:center;padding:22px 8px 6px;}
.feedback-note{font-size:13px;font-weight:800;color:#667085;line-height:1.7;text-align:center;margin-top:6px;}

.event-modal{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;padding:24px 16px;}
.event-modal.open{display:flex;}
.event-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.48);backdrop-filter:blur(2px);}
.event-dialog{position:relative;width:min(92vw,420px);max-height:min(82svh,680px);overflow:auto;background:#fff;border:1.5px solid #cfd8e5;border-radius:24px;padding:20px 18px 18px;box-shadow:0 28px 70px rgba(16,24,40,.32),0 0 0 1px rgba(255,255,255,.72) inset;animation:modalIn .18s ease both;}
@keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.event-modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
.event-modal-title{font-size:19px;font-weight:900;line-height:1.35;color:var(--brand);}
.event-modal-sub{font-size:12px;font-weight:800;color:#667085;margin-top:4px;line-height:1.5;}
.event-close{appearance:none;border:1px solid #d0d5dd;background:#fff;color:#667085;border-radius:999px;width:34px;height:34px;font-size:20px;line-height:1;font-weight:900;cursor:pointer;flex:0 0 auto;}
.event-section{border-top:1px solid #dfe6f0;padding-top:13px;margin-top:13px;}
.event-section:first-child{border-top:none;padding-top:0;margin-top:0;}
.event-section-title{font-size:13px;font-weight:900;color:#4C3DAA;background:#F1ECFF;border:none;border-radius:12px;padding:9px 10px;margin-bottom:10px;line-height:1.5;box-shadow:0 3px 10px rgba(76,61,170,.06);}
.event-list{display:flex;flex-direction:column;gap:10px;}
.event-item{background:#fff;border:1px solid #d8e1ec;border-radius:14px;padding:11px 12px;box-shadow:0 4px 12px rgba(16,24,40,.06);}
.event-item-title{font-size:14px;font-weight:900;line-height:1.45;margin-bottom:4px;}
.event-date-note{font-size:70%;font-weight:800;vertical-align:baseline;}
.event-item-desc{font-size:12px;color:#475467;font-weight:800;line-height:1.65;}
.retry-btn{margin-top:3px;background:#fff;border:1.5px solid #d0d5dd;border-radius:14px;padding:13px 18px;font-size:14px;color:#667085;cursor:pointer;display:block;width:100%;font-family:inherit;font-weight:800;min-height:48px;box-shadow:0 2px 10px rgba(16,24,40,.04);}
@media (hover:hover){
  .back-btn:hover{color:#667085;}
  .retry-btn:hover{border-color:#98a2b3;color:#344054;}
}
@media (max-width:360px){
  .start-screen{padding-left:16px;padding-right:16px;}
  .start-title{font-size:30px;gap:.18em;margin-bottom:10px;}
  .start-lead{margin:0 0 12px;max-width:320px;}
  .start-characters{margin-bottom:16px;}
  .start-character{margin:0 -10px;max-width:150px;}
  .start-character img{max-height:min(39svh,272px);}
  .start-character .dept-label{font-size:10px;}
  .start-character .char-name{font-size:14px;}
  .dept-portrait.large{width:88px;height:88px;}
  .dept-portrait.compact{width:64px;height:64px;}
  .result-media{gap:10px;}
  .event-dialog{width:min(94vw,420px);padding:18px 16px 16px;}
  .event-btn{font-size:11px;padding:9px 12px;}
  .start-btn{margin-top:24px;}
  body.app-mode{padding-left:10px;padding-right:10px;}
  body.question-mode .container{padding-top:18px;}
  .q-text{font-size:17px;}
  .c-btn{font-size:14px;padding:14px;}
}

</style>
</head>
<body class="start-mode">
<div id="start-screen" class="start-screen" aria-label="スタート画面">
  <h1 class="start-title">
    <span class="title-faculty">広島工業大学 情報学部</span>
    <span class="title-app">学科発見アプリ</span>
  </h1>
  <p class="start-lead" id="start-lead">あなたの興味に近い学科が分かるかも？！</p>

function fitStartLeadOneLine(){
  if(!startLead)return;
  const min=13;
  const max=22;
  let size=max;
  startLead.style.fontSize=max+'px';
  while(startLead.scrollWidth>startLead.clientWidth && size>min){
    size-=0.5;
    startLead.style.fontSize=size+'px';
  }
}

function createRandomId(){
  if(window.crypto&&crypto.randomUUID)return crypto.randomUUID();
  return 'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,10);
}
function getOrCreateVisitorId(){
  try{
    const saved=localStorage.getItem(VISITOR_STORAGE_KEY);
    if(saved)return saved;
    const id=createRandomId();
    localStorage.setItem(VISITOR_STORAGE_KEY,id);
    return id;
  }catch(e){
    return createRandomId();
  }
}
function buildResponsePayload(){
  const payload={
    timestamp:new Date().toISOString(),
    visitorId,
    sessionId
  };
  for(let i=0;i<TOTAL;i++){
    const answer=answers.find(a=>a.qi===i);
    payload['q'+(i+1)+'_choiceId']=answer?answer.choiceId:'';
  }
  return payload;
}
function sendResponseData(){
  if(responseSent||!DATA_ENDPOINT)return;
  responseSent=true;
  const body=JSON.stringify(buildResponsePayload());
  try{
    if(navigator.sendBeacon){
      const blob=new Blob([body],{type:'text/plain;charset=UTF-8'});
      if(navigator.sendBeacon(DATA_ENDPOINT,blob))return;
    }
  }catch(e){}
  try{
    fetch(DATA_ENDPOINT,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=UTF-8'},
      body,
      keepalive:true
    }).catch(e=>console.warn('回答データを送信できませんでした',e));
  }catch(e){
    console.warn('回答データを送信できませんでした',e);
  }
}
function buildFeedbackPayload(reactionId){
  return {
    timestamp:new Date().toISOString(),
    visitorId,
    sessionId,
    reactionId
  };
}
function sendFeedbackData(reactionId){
  if(!FEEDBACK_ENDPOINT)return;
  const body=JSON.stringify(buildFeedbackPayload(reactionId));
  try{
    if(navigator.sendBeacon){
      const blob=new Blob([body],{type:'text/plain;charset=UTF-8'});
      if(navigator.sendBeacon(FEEDBACK_ENDPOINT,blob))return;
    }
  }catch(e){}
  try{
    fetch(FEEDBACK_ENDPOINT,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=UTF-8'},
      body,
      keepalive:true
    }).catch(e=>console.warn('リアクションデータを送信できませんでした',e));
  }catch(e){
    console.warn('リアクションデータを送信できませんでした',e);
  }
}

function startApp(){
  started=true;
  document.body.classList.remove('start-mode');
  document.body.classList.add('app-mode');
  startScreen.style.display='none';
  app.style.display='block';
  sessionId=createRandomId();
  responseSent=false;
  feedbackSent=false;
  selectedReactionId='';
  answers=[];
  currentQ=0;
  buildShuffledChoices();
  render();
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function buildShuffledChoices(){
  shuffledChoices=QS.map(q=>shuffle(q.choices));
}
function calcScores(){
  const scores=Object.fromEntries(DEPT_KEYS.map(key=>[key,0]));
  const weightAnswer=answers.find(answer=>answer.boostQuestionId);
  const boostedQuestionId=weightAnswer?weightAnswer.boostQuestionId:null;
  answers.forEach(answer=>{
    if(answer.scores===undefined)return;
    const questionId=QS[answer.qi]?.id;
    const weight=(questionId===boostedQuestionId)?2:1;
    DEPT_KEYS.forEach(key=>{
      scores[key]+=(answer.scores[key]||0)*weight;
    });
  });
  return scores;
}
function ranking(scores){
  return DEPT_KEYS.map(key=>({key,score:scores[key]})).sort((a,b)=>b.score-a.score);
}
function updateProg(){
  const page=currentQ+1;
  const bar=document.getElementById('prog');
  bar.style.width=(page/TOTAL*100)+'%';
  const pb=document.querySelector('.prog-bar');
  pb.setAttribute('aria-valuenow',page);
  document.getElementById('prog-label').textContent='質問 '+page+' / '+TOTAL;
}
function render(){
  if(!started)return;
  document.body.classList.add('question-mode');
  progArea.style.display='block';
  updateProg();
  const main=document.getElementById('main');
  main.innerHTML='';
  const q=QS[currentQ];
  const orderedChoices=shuffledChoices[currentQ];
  if(currentQ===0){
    const guide=document.createElement('div');
    guide.className='q-guide';
    guide.textContent='あなたの考えに一番近い選択肢を、直感的に選んでください。正解・不正解はありません';
    main.appendChild(guide);
  }
  const card=document.createElement('section');
  card.className='q-card';
  const num=document.createElement('div');
  num.className='q-num';
  num.textContent='QUESTION '+(currentQ+1);
  card.appendChild(num);
  const qt=document.createElement('div');
  qt.className='q-text';
  qt.textContent=q.text;
  card.appendChild(qt);
  const ch=document.createElement('div');
  ch.className='choices';
  const prev=answers.find(a=>a.qi===currentQ);
  orderedChoices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='c-btn';
    btn.type='button';
    btn.textContent=c.label;
    if(prev&&prev.label===c.label)btn.classList.add('selected');
    btn.onclick=()=>choose(btn,ch,c);
    ch.appendChild(btn);
  });
  card.appendChild(ch);
  if(currentQ>0){
    const back=document.createElement('button');
    back.className='back-btn';
    back.type='button';
    back.textContent='前の質問に戻る';
    back.onclick=goBack;
    card.appendChild(back);
  }
  main.appendChild(card);
}
let choiceLocked=false;
function choose(btn,ch,c){
  if(choiceLocked)return;
  choiceLocked=true;
  ch.querySelectorAll('.c-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  ch.classList.add('locked');
  answers=answers.filter(a=>a.qi!==currentQ);
  const rec={qi:currentQ,questionId:QS[currentQ].id,choiceId:c.choiceId,label:c.label};
  if(c.boostQuestionId!==undefined){rec.boostQuestionId=c.boostQuestionId;}else{rec.scores=c.scores;}
  answers.push(rec);
  const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  setTimeout(()=>{
    choiceLocked=false;
    currentQ++;
    if(currentQ>=TOTAL){
      showJudging();
    }else{
      render();
    }
  },reduceMotion?40:200);
}
function goBack(){
  if(currentQ===0||choiceLocked)return;
  currentQ--;
  render();
}
function showJudging(){
  document.body.classList.remove('question-mode');
  progArea.style.display='none';
  const main=document.getElementById('main');
  main.innerHTML='';
  const card=document.createElement('section');
  card.className='judging-card';
  card.setAttribute('aria-live','polite');
  const dots=document.createElement('div');
  dots.className='judging-dots';
  for(let i=0;i<3;i++)dots.appendChild(document.createElement('span'));
  card.appendChild(dots);
  el(card,'p','judging-text','あなたに近い学科を分析中…');
  main.appendChild(card);
  sendResponseData();
  const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  setTimeout(showResult,reduceMotion?150:2000);
}
function showResult(){
  document.body.classList.remove('question-mode');
  progArea.style.display='none';
  const s=calcScores();
  const rank=ranking(s);
  const topScore=rank[0].score;
  const topItems=rank.filter(item=>item.score===topScore);
  const lowerItems=rank.filter(item=>item.score!==topScore);
  const main=document.getElementById('main');
  main.innerHTML='';
  const wrap=document.createElement('div');
  wrap.className='result-wrap';

  if(topItems.length===1){
    const topKey=topItems[0].key;
    const d1=DEPT[topKey];
    const top=document.createElement('section');
    top.className='result-top';
    const hero=document.createElement('div');
    hero.className='r-hero';
    hero.style.background='linear-gradient(135deg,'+d1.style.accent+' 0%,'+d1.style.main+' 100%)';
    el(hero,'div','r-hero-eyebrow','あなたの関心タイプは');
    el(hero,'div','r-hero-type',d1.type);
    el(hero,'p','r-hero-reason',getResultReason(topItems));
    el(hero,'div','r-hero-rule','');
    top.appendChild(hero);
    const body=document.createElement('div');
    body.className='r-body-stagger';
    el(body,'div','r-announce','まずこの学科を見るのがおすすめです');
    const media=createDeptResultMedia(topKey,'large');
    const topName=el(media.text,'div','r-rank1-name',d1.name);
    topName.style.color=d1.style.main;
    el(media.text,'p','r-catch',d1.catch);
    body.appendChild(media.wrap);
    const topGoal=el(body,'p','r-goal','学びのゴール：'+d1.goal);
    topGoal.style.background=d1.style.light;
    body.appendChild(createEventButton(topKey));
    top.appendChild(body);
    wrap.appendChild(top);

    if(lowerItems.length>0){
      el(wrap,'p','others-title','あわせて見比べたい学科');
      const ow=document.createElement('div');
      ow.className='rank-others';
      lowerItems.forEach(item=>ow.appendChild(createCompactDeptCard(item)));
      wrap.appendChild(ow);
    }
  }else{
    const top=document.createElement('section');
    top.className='result-top';
    const hero=document.createElement('div');
    hero.className='r-hero';
    hero.style.background='linear-gradient(135deg,'+RESULT_THEME.tieHeroStart+' 0%,'+RESULT_THEME.tieHeroEnd+' 100%)';
    el(hero,'div','r-hero-eyebrow','あなたの関心タイプは');
    const typeEl=document.createElement('div');
    typeEl.className='r-hero-type long';
    if(topItems.length===2){
      const l1=document.createElement('span');
      l1.style.display='block';
      l1.textContent=DEPT[topItems[0].key].type.replace('タイプ','');
      const l2=document.createElement('span');
      l2.style.display='block';
      l2.textContent='× '+DEPT[topItems[1].key].type;
      typeEl.appendChild(l1);
      typeEl.appendChild(l2);
    }else{
      typeEl.textContent='オールラウンドタイプ';
    }
    hero.appendChild(typeEl);
    el(hero,'p','r-hero-reason',getResultReason(topItems));
    el(hero,'div','r-hero-rule','');
    top.appendChild(hero);
    const body=document.createElement('div');
    body.className='r-body-stagger';
    if(topItems.length===2){
      el(body,'div','r-announce','あなたの関心に近い学科は2つあります');
    }else{
      el(body,'div','r-announce','3学科にバランスよく関心があります');
    }
    top.appendChild(body);
    wrap.appendChild(top);

    el(wrap,'p','tie-section-title',topItems.length===2?'まず見てほしい学科':'見比べてほしい学科');
    const ow=document.createElement('div');
    ow.className='rank-others';
    topItems.forEach(item=>ow.appendChild(createCompactDeptCard(item)));
    wrap.appendChild(ow);

    if(lowerItems.length>0){
      el(wrap,'p','others-title','あわせて見比べたい学科');
      const lw=document.createElement('div');
      lw.className='rank-others';
      lowerItems.forEach(item=>lw.appendChild(createCompactDeptCard(item)));
      wrap.appendChild(lw);
    }
  }

  wrap.appendChild(createFeedbackArea());
  const retry=document.createElement('button');
  retry.className='retry-btn';
  retry.type='button';
  retry.textContent='もう一度はじめる';
  retry.onclick=resetToStart;
  wrap.appendChild(retry);
  main.appendChild(wrap);
  fitDeptNamesOneLine();
}
function getResultReason(items){
  const key=items.map(item=>item.key).sort((a,b)=>DEPT_KEYS.indexOf(a)-DEPT_KEYS.indexOf(b)).join('+');
  return RESULT_REASONS[key]||'';
}
function fitDeptNamesOneLine(){
  fitOneLineText('.r-rank1-name',30,16);
  fitOneLineText('.rank-name',18,12);
}
function fitOneLineText(selector,max,min){
  document.querySelectorAll(selector).forEach(elm=>{
    let size=max;
    elm.style.fontSize=max+'px';
    while(elm.scrollWidth>elm.clientWidth && size>min){
      size-=0.5;
      elm.style.fontSize=size+'px';
    }
  });
}
window.addEventListener('resize',fitDeptNamesOneLine);
function createFeedbackArea(){
  const area=document.createElement('section');
  area.className='feedback-area';
  el(area,'div','feedback-title','結果はどうでしたか？');
  el(area,'p','feedback-lead','高校生のみなさんの反応を、今後の学科紹介に活かします');
  const btn=document.createElement('button');
  btn.id='feedback-btn';
  btn.className='feedback-btn';
  btn.type='button';
  if(feedbackSent){
    btn.textContent='ご協力ありがとうございました';
    btn.disabled=true;
    btn.classList.add('sent');
  }else{
    btn.textContent='📝 結果へのリアクションを送る';
    btn.addEventListener('click',openFeedbackModal);
  }
  area.appendChild(btn);
  return area;
}
function updateFeedbackArea(){
  const btn=document.getElementById('feedback-btn');
  if(!btn)return;
  btn.textContent='ご協力ありがとうございました';
  btn.disabled=true;
  btn.classList.add('sent');
}
function openFeedbackModal(){
  eventModalTitle.textContent='結果へのリアクション';
  eventModalTitle.style.color='#1a3060';
  eventModalSub.textContent='結果を見てどう感じましたか？';
  eventModalBody.innerHTML='';
  if(feedbackSent){
    showFeedbackThanks();
  }else{
    el(eventModalBody,'p','feedback-modal-lead','あてはまるものを1つ選んでください');
    const list=document.createElement('div');
    list.className='feedback-options';
    FEEDBACK_OPTIONS.forEach(option=>{
      const btn=document.createElement('button');
      btn.className='feedback-option';
      btn.type='button';
      btn.textContent=option.label;
      btn.addEventListener('click',()=>submitFeedbackWithFeedback(btn,list,option.id));
      list.appendChild(btn);
    });
    eventModalBody.appendChild(list);
  }
  eventModal.classList.add('open');
  eventModal.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  eventClose.focus();
}
function submitFeedbackWithFeedback(btn,list,reactionId){
  if(feedbackSent)return;
  list.querySelectorAll('.feedback-option').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  list.classList.add('locked');
  const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  setTimeout(()=>submitFeedback(reactionId),reduceMotion?40:200);
}
function submitFeedback(reactionId){
  if(feedbackSent)return;
  feedbackSent=true;
  selectedReactionId=reactionId;
  sendFeedbackData(reactionId);
  updateFeedbackArea();
  showFeedbackThanks();
}
function showFeedbackThanks(){
  eventModalSub.textContent='送信しました';
  eventModalBody.innerHTML='';
  el(eventModalBody,'div','feedback-thanks','ご協力ありがとうございました');
  el(eventModalBody,'p','feedback-note','結果画面に戻って、引き続き学科の情報を見ることができます');
}
function createEventButton(key){
  const d=DEPT[key];
  const row=document.createElement('div');
  row.className='event-action-row';
  const btn=document.createElement('button');
  btn.className='event-btn';
  btn.type='button';
  btn.textContent='この学科のイベントを見る';
  btn.style.setProperty('--event-main',d.style.main);
  btn.style.setProperty('--event-accent',d.style.accent);
  btn.addEventListener('click',()=>openEventModal(key));
  row.appendChild(btn);
  return row;
}
function appendEventTitle(parent,title){
  const titleEl=document.createElement('div');
  titleEl.className='event-item-title';
  const m=title.match(/(（8\/\d+のみ）)/);
  if(m){
    const before=title.slice(0,m.index);
    const after=title.slice(m.index+m[0].length);
    titleEl.appendChild(document.createTextNode(before));
    const note=document.createElement('span');
    note.className='event-date-note';
    note.textContent=m[0];
    titleEl.appendChild(note);
    if(after)titleEl.appendChild(document.createTextNode(after));
  }else{
    titleEl.textContent=title;
  }
  parent.appendChild(titleEl);
  return titleEl;
}
function openEventModal(key){
  const d=DEPT[key];
  const info=EVENT_INFO[key];
  if(!d||!info)return;
  eventModalTitle.textContent=d.name;
  eventModalTitle.style.color=d.style.main;
  eventModalSub.textContent='オープンキャンパスでのイベント';
  eventModalBody.innerHTML='';
  let eventNo=1;
  info.sections.forEach(section=>{
    const sec=document.createElement('section');
    sec.className='event-section';
    if(section.title)el(sec,'div','event-section-title','📍 '+section.title);
    const list=document.createElement('div');
    list.className='event-list';
    section.items.forEach((item,idx)=>{
      const card=document.createElement('article');
      card.className='event-item';
      card.style.borderLeft='4px solid '+d.style.main;
      appendEventTitle(card,eventNo+'. '+item.title);
      eventNo+=1;
      el(card,'div','event-item-desc',item.desc);
      list.appendChild(card);
    });
    sec.appendChild(list);
    eventModalBody.appendChild(sec);
  });
  eventModal.classList.add('open');
  eventModal.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  eventClose.focus();
}
function closeEventModal(){
  if(!eventModal.classList.contains('open'))return;
  eventModal.classList.remove('open');
  eventModal.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
}
function createCompactDeptCard(item){
  const d=DEPT[item.key];
  const c2=document.createElement('section');
  c2.className='rank-card';
  c2.style.borderLeft='5px solid '+d.style.main;
  const media=createDeptResultMedia(item.key,'compact');
  media.text.className='rank-body';
  const rn=el(media.text,'div','rank-name',d.name);
  rn.style.color=d.style.main;
  el(media.text,'div','rank-sub',d.catch);
  c2.appendChild(media.wrap);
  const goal=el(c2,'div','rank-goal','学びのゴール：'+d.goal);
  goal.style.background=d.style.light;
  c2.appendChild(createEventButton(item.key));
  return c2;
}
function createDeptResultMedia(key,size){
  const d=DEPT[key];
  const wrap=document.createElement('div');
  wrap.className='result-media';
  const portrait=document.createElement('div');
  portrait.className='dept-portrait '+size;
  portrait.style.setProperty('--portrait-border',d.style.portraitBorder||d.style.light);
  portrait.style.setProperty('--portrait-pos',d.style.portraitPosition||'center 18%');
  const img=document.createElement('img');
  img.src=CHARACTER_IMAGES[key]||'';
  img.alt=d.name+'のキャラクター';
  portrait.appendChild(img);
  const text=document.createElement('div');
  text.className='result-text-col';
  wrap.appendChild(portrait);
  wrap.appendChild(text);
  return {wrap,portrait,text};
}
function el(parent,tag,cls,text){
  const e=document.createElement(tag);
  e.className=cls;
  e.textContent=text;
  parent.appendChild(e);
  return e;
}
function resetToStart(){
  closeEventModal();
  answers=[];
  currentQ=0;
  selectedReactionId='';
  started=false;
  choiceLocked=false;
  document.getElementById('main').innerHTML='';
  document.getElementById('prog').style.width='0%';
  document.getElementById('prog-label').textContent='';
  progArea.style.display='block';
  app.style.display='none';
  startScreen.style.display='flex';
  document.body.classList.remove('app-mode');
  document.body.classList.remove('question-mode');
  document.body.classList.add('start-mode');
}

</script>
</body>
</html>
